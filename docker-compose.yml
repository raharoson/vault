x-app-env: &app-env
  APP_ENV: dev
  APP_SECRET: dev-secret-change-in-production
  DATABASE_URL: "postgresql://app:app@postgres:5432/lockself_vault?serverVersion=16&charset=utf8"
  JWT_SECRET_KEY: /app/config/jwt/private.pem
  JWT_PUBLIC_KEY: /app/config/jwt/public.pem
  JWT_PASSPHRASE: dev-jwt-passphrase
  ENCRYPTION_KEY: a1b2c3d4e5f6a7b8a1b2c3d4e5f6a7b8a1b2c3d4e5f6a7b8a1b2c3d4e5f6a7b8
  MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=0"
  CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'

services:

  php:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - .:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lockself_vault
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d lockself_vault"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  messenger:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    environment:
      <<: *app-env
    depends_on:
      - php
    command: ["php", "bin/console", "messenger:consume", "async", "--time-limit=3600", "-vv"]
    restart: unless-stopped

volumes:
  postgres_data:
